<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Creator Suite | SMGPUB</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">...</aside>

        <main class="main-content creator-grid">
            <div class="tools-panel">
                <h4>Assets</h4>
                <button class="tool-btn">Add Text</button>
                <button class="tool-btn">Upload Image</button>
                <button class="tool-btn">Shapes</button>
            </div>

            <div class="canvas-wrapper">
                <div id="design-canvas" class="drop-zone">
                    <p>Drop elements here to start designing</p>
                </div>
            </div>

            <div class="properties-panel">
                <h4>Properties</h4>
                <label>Opacity</label>
                <input type="range" min="0" max="100">
            </div>
        </main>
    </div>
</body>
</html>
