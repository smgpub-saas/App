<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beat Store | SMGPUB</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">...</aside>

        <main class="main-content">
            <section class="player-container">
                <div id="waveform"></div> <div class="player-controls">
                    <button id="play-pause">Play</button>
                    <span class="track-info">"Neon Midnight" - 140 BPM - Cm</span>
                </div>
            </section>

            <section class="license-grid">
                <div class="license-card">
                    <h4>Basic License</h4>
                    <p class="price">$29.99</p>
                    <ul>
                        <li>MP3 Only</li>
                        <li>5,000 Streams</li>
                    </ul>
                    <button class="btn-primary" data-price-id="price_BEAT_BASIC">Buy Now</button>
                </div>
                <div class="license-card featured">
                    <h4>Unlimited License</h4>
                    <p class="price">$199.99</p>
                    <ul>
                        <li>WAV + Stems</li>
                        <li>Unlimited Streams</li>
                    </ul>
                    <button class="btn-primary" data-price-id="price_BEAT_UNLIMITED">Buy Now</button>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
